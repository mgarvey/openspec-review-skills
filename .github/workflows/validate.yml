name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills
        run: python3 scripts/validate-skills.py

      - name: Validate plugin manifest
        run: python3 scripts/validate-plugin.py

      - name: Validate marketplace catalog JSON
        run: python3 -m json.tool .agents/plugins/marketplace.json >/dev/null

      - name: Validate install script
        run: bash scripts/validate-install.sh

      - name: Syntax check shell scripts
        shell: bash
        run: |
          mapfile -t shell_scripts < <(find scripts templates -type f \( -name '*.sh' -o -name 'ensure-openspec-repo' \) | sort)
          for script in "${shell_scripts[@]}"; do
            bash -n "$script"
          done

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck shell scripts
        shell: bash
        run: |
          mapfile -t shell_scripts < <(find scripts templates -type f \( -name '*.sh' -o -name 'ensure-openspec-repo' \) | sort)
          shellcheck "${shell_scripts[@]}"
